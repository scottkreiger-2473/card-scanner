<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Card Scanner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f5f5f3;--bg3:#ebebea;
    --text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;
    --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
    --green:#085041;--green-bg:#E1F5EE;--green-border:#5DCAA5;
    --red:#993C1D;--red-bg:#FAECE7;--red-border:#F0997B;
    --blue:#2D4DA0;--blue-bg:#EEF3FF;--blue-border:#7B96E8;
    --sold-bg:#EAF3DE;--sold-text:#3B6D11;
    --radius:12px;--radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
      --text:#f5f5f5;--text2:#ababab;--text3:#6b6b6b;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
      --green:#5DCAA5;--green-bg:#04342C;--green-border:#1D9E75;
      --red:#F0997B;--red-bg:#4A1B0C;--red-border:#D85A30;
      --blue:#85B7EB;--blue-bg:#0D1F3C;--blue-border:#3A5FA0;
      --sold-bg:#173404;--sold-text:#97C459;
    }
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
  #app{max-width:520px;margin:0 auto;padding:0;padding-bottom:40px}

  /* ── Top nav ── */
  .top-nav{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;padding:0 16px;gap:0}
  .nav-title{font-size:16px;font-weight:700;padding:14px 0;flex:1}
  .nav-tabs{display:flex;gap:0}
  .nav-tab{font-size:13px;font-weight:500;padding:14px 16px;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
  .nav-tab.active{color:var(--text);border-bottom-color:var(--text)}

  /* ── Panels ── */
  .panel{display:none;padding:16px}
  .panel.active{display:block}

  /* ── API Key ── */
  #apikey-screen{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  #apikey-screen h2{font-size:14px;font-weight:600;margin-bottom:4px}
  #apikey-screen p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
  #apikey-input{width:100%;padding:9px 12px;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--text);margin-bottom:8px;font-family:monospace}
  #save-key-btn{padding:8px 16px;font-size:13px;font-weight:600;border-radius:var(--radius-sm);border:none;background:var(--text);color:var(--bg);cursor:pointer}
  #change-key-btn{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;margin-left:10px}
  .key-ok{font-size:12px;color:var(--green);display:none;margin-top:6px}

  /* ── Camera ── */
  #video-wrap{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;aspect-ratio:4/3;width:100%}
  #video{width:100%;height:100%;object-fit:cover;display:block}
  #canvas{display:none}
  .corner{position:absolute;width:26px;height:26px}
  .corner.tl{top:14px;left:14px;border-top:2.5px solid #fff;border-left:2.5px solid #fff;border-radius:4px 0 0 0}
  .corner.tr{top:14px;right:14px;border-top:2.5px solid #fff;border-right:2.5px solid #fff;border-radius:0 4px 0 0}
  .corner.bl{bottom:14px;left:14px;border-bottom:2.5px solid #fff;border-left:2.5px solid #fff;border-radius:0 0 0 4px}
  .corner.br{bottom:14px;right:14px;border-bottom:2.5px solid #fff;border-right:2.5px solid #fff;border-radius:0 0 4px 0}
  #hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:#fff;font-size:12px;padding:4px 12px;border-radius:20px;white-space:nowrap}
  #preview-img{width:100%;border-radius:var(--radius);display:none;object-fit:contain;background:#000;max-height:340px}
  .btn-primary{width:100%;margin-top:10px;padding:13px;font-size:15px;font-weight:600;border-radius:var(--radius);border:none;background:var(--text);color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary:disabled{opacity:0.35;cursor:not-allowed}
  .btn-secondary{width:100%;margin-top:8px;padding:10px;font-size:14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  #rescan-btn{display:none}
  #file-input{display:none}

  /* ── Status / Error ── */
  #status{margin-top:12px}
  .status-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);padding:5px 0}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error-msg{margin-top:10px;font-size:13px;color:var(--red);display:none;padding:10px 14px;background:var(--red-bg);border-radius:var(--radius-sm);border:1px solid var(--red-border);line-height:1.5}

  /* ── Result card ── */
  #result{display:none;margin-top:14px}
  .card-header{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
  .card-player{font-size:17px;font-weight:700;margin-bottom:2px}
  .card-meta{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5}
  .tags{display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text2)}
  .tag.graded{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
  .tag.raw{background:#FAEEDA;color:#633806;border-color:#EF9F27}
  .section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 7px}

  /* ── Price ladder ── */
  .price-ladder{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:4px}
  .ladder-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:10px}
  .ladder-row:last-child{border-bottom:none}
  .ladder-grade{font-size:12px;font-weight:600;width:58px;flex-shrink:0;color:var(--text)}
  .ladder-bar-wrap{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
  .ladder-bar{height:100%;border-radius:4px;background:var(--green-border)}
  .ladder-row.realistic .ladder-grade{color:var(--blue)}
  .ladder-row.realistic .ladder-bar{background:var(--blue-border)}
  .ladder-prices{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:90px}
  .ladder-gross{font-size:13px;font-weight:600;color:var(--text)}
  .ladder-net{font-size:10px;color:var(--green)}
  .ladder-count{font-size:11px;color:var(--text3);white-space:nowrap;min-width:36px;text-align:right}
  .ladder-note{font-size:11px;color:var(--text3);margin-bottom:10px;padding:0 2px}

  /* ── Grade filter ── */
  .grade-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .gf-btn{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer}
  .gf-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}

  /* ── Stats ── */
  .stats-row{display:flex;gap:8px;margin-bottom:10px}
  .stat-box{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:9px 11px}
  .stat-label{font-size:11px;color:var(--text2);margin-bottom:2px}
  .stat-val{font-size:18px;font-weight:700;color:var(--text)}
  .stat-val.g{color:var(--green)}
  .stat-sub{font-size:10px;color:var(--green);margin-top:1px}

  /* ── Listings ── */
  .listings-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
  .listing-item{padding:9px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
  .listing-item:last-child{border-bottom:none}
  .listing-ph{width:38px;height:38px;border-radius:var(--radius-sm);background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
  .listing-info{flex:1;min-width:0}
  .listing-name{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .listing-sub{font-size:10px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .sold-pill{font-size:9px;background:#FFF3CD;color:#856404;border-radius:3px;padding:1px 5px;font-weight:700}
  .listing-link{font-size:10px;color:var(--blue);text-decoration:none;display:block;margin-top:2px}
  .listing-prices{text-align:right}
  .listing-gross{font-size:13px;font-weight:600;color:var(--text)}
  .listing-net{font-size:10px;color:var(--green)}
  .no-comps{font-size:13px;color:var(--text2);padding:16px;text-align:center}

  /* ── Decision ── */
  .decision-box{border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
  .decision-box.sell{background:var(--red-bg);border:1px solid var(--red-border)}
  .decision-box.keep{background:var(--green-bg);border:1px solid var(--green-border)}
  .decision-box.grade{background:var(--blue-bg);border:1px solid var(--blue-border)}
  .decision-title{font-size:16px;font-weight:700;margin-bottom:5px}
  .decision-title.sell{color:var(--red)}
  .decision-title.keep{color:var(--green)}
  .decision-title.grade{color:var(--blue)}
  .decision-detail{font-size:13px;color:var(--text2);line-height:1.6}
  .decision-math{font-size:12px;color:var(--text2);background:rgba(0,0,0,0.05);border-radius:6px;padding:8px 10px;line-height:2;margin-top:8px}
  .decision-math b{color:var(--text)}
  #ebay-btn{width:100%;padding:10px;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
  #scan-back-btn{width:100%;padding:11px;font-size:14px;font-weight:600;border-radius:var(--radius);border:1px solid var(--blue-border);background:var(--blue-bg);color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
  #scan-back-file{display:none}
  .back-note{font-size:11px;color:var(--text3);text-align:center;margin-top:4px}

  /* ── Collection tab ── */
  .coll-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .coll-toolbar select{font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer}
  .coll-toolbar input{font-size:13px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);flex:1;min-width:0}
  .export-btn{font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap}
  .coll-summary{display:flex;gap:8px;margin-bottom:12px}
  .sum-box{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
  .sum-label{font-size:11px;color:var(--text2);margin-bottom:2px}
  .sum-val{font-size:16px;font-weight:700;color:var(--text)}
  .coll-empty{font-size:13px;color:var(--text3);text-align:center;padding:32px 16px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)}
  /* Collection cards (mobile-first) */
  .coll-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
  .coll-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
  .coll-card-left{flex:1;min-width:0}
  .coll-card-player{font-size:15px;font-weight:700;margin-bottom:2px}
  .coll-card-meta{font-size:12px;color:var(--text2);line-height:1.4}
  .coll-card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .coll-card-gross{font-size:15px;font-weight:700}
  .coll-card-net{font-size:11px;color:var(--green)}
  .coll-card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
  .coll-card-reason{font-size:11px;color:var(--text2);line-height:1.4;flex:1;margin-right:10px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .badge.sell{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
  .badge.keep{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
  .badge.grade{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
  .del-btn{font-size:22px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0}
  .del-btn:hover{color:var(--red)}
  .ebay-fee-note{font-size:11px;color:var(--text3);margin-top:6px;padding:6px 10px;background:var(--bg2);border-radius:var(--radius-sm)}
</style>
</head>
<body>
<div id="app">
  <div class="top-nav">
    <div class="nav-title">🃏 Card Scanner</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('scan')">Scanner</button>
      <button class="nav-tab" onclick="showTab('collection')">Collection <span id="coll-badge"></span></button>
    </div>
  </div>

  <!-- ══ SCANNER PANEL ══ -->
  <div class="panel active" id="panel-scan">

    <div id="apikey-screen">
      <h2>Anthropic API Key</h2>
      <p>Stored only in your browser. Never sent to anyone except Anthropic directly.</p>
      <input id="apikey-input" type="password" placeholder="sk-ant-..." autocomplete="off"/>
      <button id="save-key-btn" onclick="saveKey()">Save key</button>
      <button id="change-key-btn" onclick="changeKey()" style="display:none">Change key</button>
      <div class="key-ok" id="key-ok">✓ Key saved</div>
    </div>

    <div id="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="hint">Hold card up to camera</div>
    </div>
    <img id="preview-img" alt="Captured card"/>
    <canvas id="canvas"></canvas>
    <button id="scan-btn" class="btn-primary" disabled>📷 Scan card</button>
    <button id="rescan-btn" class="btn-secondary">↩ Scan another card</button>
    <button id="upload-btn" class="btn-secondary">⬆ Upload photo instead</button>
    <input type="file" id="file-input" accept="image/*"/>
    <div id="status"></div>
    <div id="error-msg"></div>
    <div id="result"></div>
  </div>

  <!-- ══ COLLECTION PANEL ══ -->
  <div class="panel" id="panel-collection">
    <div class="coll-summary" id="coll-summary"></div>
    <div class="coll-toolbar">
      <input type="text" id="coll-search" placeholder="Search cards…" oninput="renderCollection()"/>
      <select id="coll-sort" onchange="renderCollection()">
        <option value="date">Newest first</option>
        <option value="value-desc">Highest value</option>
        <option value="value-asc">Lowest value</option>
        <option value="player">Player A–Z</option>
        <option value="decision">Decision</option>
      </select>
      <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div id="coll-list"></div>
    <div class="ebay-fee-note">All net prices reflect 13% eBay seller fee deducted from gross sold prices.</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// Constants
// ════════════════════════════════════════════════════════
const EBAY_FEE=0.13;
const GRADING_COST=20;
const GRADE_FILTERS=['All','Raw','PSA 5','PSA 6','PSA 7','PSA 8','PSA 9','PSA 10','BGS 9','BGS 9.5'];
const REALISTIC_GRADES=['PSA 5','PSA 6','PSA 7'];
const LADDER_GRADES=['Raw','PSA 5','PSA 6','PSA 7','PSA 8','PSA 9','PSA 10'];

// ════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════
let stream=null, allListings=[], cardInfo=null, activeFilter='All';
let collection=JSON.parse(localStorage.getItem('card_collection_v4')||'[]');
let sortCol='date', sortDir=1;

// ════════════════════════════════════════════════════════
// Tabs
// ════════════════════════════════════════════════════════
function showTab(tab){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab==='collection')renderCollection();
}

// ════════════════════════════════════════════════════════
// API Key
// ════════════════════════════════════════════════════════
function getKey(){return localStorage.getItem('anthropic_api_key')||'';}
function saveKey(){
  const k=document.getElementById('apikey-input').value.trim();
  if(!k){alert('Please enter your API key.');return;}
  localStorage.setItem('anthropic_api_key',k);
  document.getElementById('apikey-input').value='';
  document.getElementById('key-ok').style.display='block';
  document.getElementById('change-key-btn').style.display='inline';
  setTimeout(()=>document.getElementById('key-ok').style.display='none',2000);
}
function changeKey(){document.getElementById('apikey-input').value='';document.getElementById('key-ok').style.display='none';}
(()=>{if(getKey()){document.getElementById('change-key-btn').style.display='inline';document.getElementById('apikey-screen').querySelector('p').textContent='API key saved. Ready to scan.';}})();

// ════════════════════════════════════════════════════════
// Camera
// ════════════════════════════════════════════════════════
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const previewImg=document.getElementById('preview-img');

async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}});
    video.srcObject=stream;video.play();
    document.getElementById('scan-btn').disabled=false;
  }catch(e){
    document.getElementById('video-wrap').innerHTML='<div style="padding:36px;text-align:center;color:#888;font-size:14px">📷 Camera unavailable<br><small style="display:block;margin-top:6px">Use upload button below</small></div>';
    document.getElementById('scan-btn').style.display='none';
  }
}
startCamera();

function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}
function captureFrame(){
  const ctx=canvas.getContext('2d');
  canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||960;
  ctx.drawImage(video,0,0);
  return canvas.toDataURL('image/jpeg',0.92).split(',')[1];
}
function showPreview(b64){
  document.getElementById('video-wrap').style.display='none';
  previewImg.src='data:image/jpeg;base64,'+b64;previewImg.style.display='block';
  document.getElementById('scan-btn').style.display='none';
  document.getElementById('rescan-btn').style.display='flex';
  document.getElementById('upload-btn').style.display='none';
}
document.getElementById('rescan-btn').addEventListener('click',()=>{
  previewImg.style.display='none';
  document.getElementById('rescan-btn').style.display='none';
  document.getElementById('video-wrap').style.display='block';
  document.getElementById('scan-btn').style.display='flex';
  document.getElementById('upload-btn').style.display='flex';
  document.getElementById('status').innerHTML='';
  document.getElementById('result').style.display='none';
  document.getElementById('error-msg').style.display='none';
  allListings=[];cardInfo=null;activeFilter='All';
  startCamera();
});
document.getElementById('upload-btn').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{const b64=ev.target.result.split(',')[1];stopCamera();showPreview(b64);clearError();run(b64);};
  r.readAsDataURL(f);e.target.value='';
});
document.getElementById('scan-btn').addEventListener('click',()=>{
  const b64=captureFrame();stopCamera();showPreview(b64);clearError();run(b64);
});

// ════════════════════════════════════════════════════════
// UI helpers
// ════════════════════════════════════════════════════════
function setStatus(text,spinning){
  document.getElementById('status').innerHTML=text
    ?`<div class="status-row">${spinning?'<div class="spinner"></div>':'✅'} <span>${text}</span></div>`:'';
}
function clearError(){document.getElementById('error-msg').style.display='none';}
function showError(msg){const e=document.getElementById('error-msg');e.innerHTML=msg;e.style.display='block';}

// ════════════════════════════════════════════════════════
// Price math  (always store/display gross; compute net on the fly)
// ════════════════════════════════════════════════════════
function priceNum(str){
  const m=(str||'').match(/\$?([\d,]+\.?\d*)/);
  return m?parseFloat(m[1].replace(',','')):null;
}
function netOf(gross){return gross==null?null:gross*(1-EBAY_FEE);}
function fmtG(n){return n==null?'—':'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){const net=netOf(n);return net==null?'—':'$'+net.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function avgGrossOf(listings){
  const p=listings.map(l=>priceNum(l.price)).filter(Boolean);
  return p.length?p.reduce((a,b)=>a+b,0)/p.length:null;
}
function avgNetOf(listings){return netOf(avgGrossOf(listings));}

function buildGradeMap(listings){
  const map={};
  listings.forEach(l=>{
    const g=l.condition||'Raw';
    if(!map[g])map[g]={listings:[]};
    map[g].listings.push(l);
  });
  Object.keys(map).forEach(g=>{
    map[g].grossAvg=avgGrossOf(map[g].listings);
    map[g].netAvg=netOf(map[g].grossAvg);
    map[g].count=map[g].listings.length;
  });
  return map;
}

const EBAY_PROXY='https://script.google.com/macros/s/AKfycbzWt-Q_c9Cbrsr3yiRZ7u6WQ4EW4mgSYCaCjM5jXiljZfjac7d63k2sASs5I0vBhdCs/exec'; // Browse API - active listings

function detectGrade(text){
  const t=text.toUpperCase();
  if(/PSA\s*10/.test(t))return'PSA 10';
  if(/PSA\s*9\.5/.test(t))return'PSA 9.5';
  if(/PSA\s*9\b/.test(t))return'PSA 9';
  if(/PSA\s*8\.5/.test(t))return'PSA 8.5';
  if(/PSA\s*8\b/.test(t))return'PSA 8';
  if(/PSA\s*7\b/.test(t))return'PSA 7';
  if(/PSA\s*6\b/.test(t))return'PSA 6';
  if(/PSA\s*5\b/.test(t))return'PSA 5';
  if(/PSA\s*4\b/.test(t))return'PSA 4';
  if(/BGS\s*9\.5/.test(t))return'BGS 9.5';
  if(/BGS\s*9\b/.test(t))return'BGS 9';
  if(/BGS\s*8\.5/.test(t))return'BGS 8.5';
  if(/SGC\s*10/.test(t))return'SGC 10';
  if(/SGC\s*9\b/.test(t))return'SGC 9';
  if(/PSA|BGS|SGC|CGC|GRADED|SLAB/.test(t))return'Graded';
  return'Raw';
}

// Search eBay via Google Apps Script proxy (no CORS issues)
async function ebaySearch(query){
  const url=EBAY_PROXY+'?q='+encodeURIComponent(query);
  try{
    const res=await fetch(url,{redirect:'follow',mode:'cors'});
    if(!res.ok){
      console.warn('eBay proxy failed:',res.status);
      return[];
    }
    const data=await res.json();
  return(data.itemSummaries||[]).map(item=>{
    const price=item.price?.value?`$${parseFloat(item.price.value).toFixed(2)}`:null;
    const title=item.title||'';
    const condition=detectGrade(title);
    const endDate=item.itemEndDate?new Date(item.itemEndDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):null;
    return{
      title:title.substring(0,80),
      price,
      dateSold:endDate,
      condition,
      url:item.itemWebUrl||null
    };
  }).filter(i=>i.price);
  }catch(e){
    console.warn('ebaySearch error:',e);
    return[];
  }
}

// Run grade-specific searches in parallel via proxy
async function fetchSoldComps(baseQuery){
  const gradeQueries=[
    `${baseQuery}`,
    `${baseQuery} PSA 10`,
    `${baseQuery} PSA 9`,
    `${baseQuery} PSA 8`,
    `${baseQuery} PSA 7`,
    `${baseQuery} PSA 6`,
    `${baseQuery} PSA 5`,
    `${baseQuery} raw`,
  ];

  const results=await Promise.allSettled(
    gradeQueries.map(q=>ebaySearch(q))
  );

  // Merge and deduplicate by URL
  const seen=new Set();
  const all=[];
  results.forEach(r=>{
    if(r.status==='fulfilled'){
      r.value.forEach(item=>{
        const key=item.url||item.title;
        if(!seen.has(key)){seen.add(key);all.push(item);}
      });
    }
  });
  console.log(`eBay returned ${all.length} total comps`);
  return all;
}

// ════════════════════════════════════════════════════════
function renderPriceLadder(gradeMap, currentGrade){
  const present=LADDER_GRADES.filter(g=>gradeMap[g]?.grossAvg);
  if(!present.length)return'';
  const maxNet=Math.max(...present.map(g=>gradeMap[g].netAvg));
  const isAlreadyGraded=!!(currentGrade);
  const rows=present.map(g=>{
    const gm=gradeMap[g];
    const pct=maxNet>0?Math.round((gm.netAvg/maxNet)*100):0;
    const isHighlight=isAlreadyGraded?(g===currentGrade):REALISTIC_GRADES.includes(g);
    const starLabel=isAlreadyGraded?(g===currentGrade?' ◄':''):(REALISTIC_GRADES.includes(g)?' ★':'');
    return`<div class="ladder-row${isHighlight?' realistic':''}">
      <div class="ladder-grade">${g}${starLabel}</div>
      <div class="ladder-bar-wrap"><div class="ladder-bar" style="width:${pct}%"></div></div>
      <div class="ladder-prices">
        <div class="ladder-gross">${fmtG(gm.grossAvg)}</div>
        <div class="ladder-net">Net ${fmtN(gm.grossAvg)}</div>
      </div>
      <div class="ladder-count">${gm.count} sale${gm.count!==1?'s':''}</div>
    </div>`;
  }).join('');
  const note=isAlreadyGraded
    ?`◄ This card's grade &nbsp;·&nbsp; Net = after 13% eBay fee`
    :`★ Realistic grading outcome (PSA 5–7) &nbsp;·&nbsp; Net = after 13% eBay fee`;
  return`<div class="price-ladder">${rows}</div>
  <div class="ladder-note">${note}</div>`;
}

// ════════════════════════════════════════════════════════
// Decision Engine
// ════════════════════════════════════════════════════════
function makeDecision(ci, listings, gradeMap){
  const isGraded=!!(ci.gradingInfo);

  // ── GRADED CARD LOGIC ──────────────────────────────────
  // Use comps that match the card's actual grade, not raw prices
  if(isGraded){
    const grade=ci.gradingInfo; // e.g. "PSA 9"
    // Normalize grade key to match our gradeMap keys (PSA 9, BGS 9.5, etc.)
    const gradeKey=Object.keys(gradeMap).find(k=>k.toUpperCase()===grade.toUpperCase())||grade;
    const gradeData=gradeMap[gradeKey];
    const gradeNetAvg=gradeData?.netAvg||null;
    const gradeGrossAvg=gradeData?.grossAvg||null;
    const gradeCount=gradeData?.count||0;

    // Can we crack out and resubmit for a higher grade?
    // Find the next grade tier above this one
    const GRADE_ORDER=['PSA 5','PSA 6','PSA 7','PSA 8','PSA 9','PSA 10','BGS 9','BGS 9.5'];
    const gradeIdx=GRADE_ORDER.indexOf(gradeKey);
    const higherGrades=gradeIdx>=0?GRADE_ORDER.slice(gradeIdx+1):[];
    const nextGradeData=higherGrades.map(g=>gradeMap[g]).find(d=>d?.netAvg);
    const nextGradeKey=higherGrades.find(g=>gradeMap[g]?.netAvg);
    const crossoverCost=30; // crack-out + resubmit cost estimate

    if(gradeNetAvg!=null){
      // Check if crossover/resubmit makes sense
      if(nextGradeData&&nextGradeKey){
        const crossoverGain=nextGradeData.netAvg-gradeNetAvg-crossoverCost;
        if(crossoverGain>gradeNetAvg*0.4&&crossoverGain>40){
          return{
            decision:'grade',
            reason:`${grade} nets ${fmtG(gradeNetAvg)}. Cracking out to resubmit for ${nextGradeKey} (avg net ${fmtG(nextGradeData.netAvg)}) could gain ~${fmtG(crossoverGain)} after ~$${crossoverCost} crack/resubmit cost — worth considering if the card looks clean.`,
            math:{gradeGrossAvg,gradeNetAvg,gradeLabel:grade,nextGradeKey,nextGradeNet:nextGradeData.netAvg,crossoverGain,crossoverCost}
          };
        }
      }
      // Sell vs hold based on current grade value
      if(gradeNetAvg>=500)return{
        decision:'keep',
        reason:`${grade} comps average ${fmtG(gradeNetAvg)} net (${fmtG(gradeGrossAvg)} gross) across ${gradeCount} sale${gradeCount!==1?'s':''}. Strong value — hold unless you need liquidity.`,
        math:{gradeGrossAvg,gradeNetAvg,gradeLabel:grade}
      };
      if(gradeNetAvg>=80)return{
        decision:'sell',
        reason:`${grade} comps average ${fmtG(gradeNetAvg)} net (${fmtG(gradeGrossAvg)} gross) across ${gradeCount} sale${gradeCount!==1?'s':''}. Solid market — good time to move it.`,
        math:{gradeGrossAvg,gradeNetAvg,gradeLabel:grade}
      };
      return{
        decision:'sell',
        reason:`${grade} comps average ${fmtG(gradeNetAvg)} net (${fmtG(gradeGrossAvg)} gross). Modest value — sell now rather than holding.`,
        math:{gradeGrossAvg,gradeNetAvg,gradeLabel:grade}
      };
    }
    // Not enough grade-specific comps — use all comps as proxy
    const allNet=avgNetOf(listings);
    if(allNet>=200)return{decision:'keep',reason:`${grade} card with limited grade-specific comps. Overall market avg ~${fmtG(allNet)} net. Hold and monitor.`};
    if(allNet>=40)return{decision:'sell',reason:`${grade} card. Limited grade-specific comps but overall market suggests ~${fmtG(allNet)} net. Sell.`};
    return{decision:'sell',reason:`${grade} card with limited comp data. Check eBay manually below.`};
  }

  // ── RAW CARD LOGIC ─────────────────────────────────────
  // Compare raw value vs realistic grading outcome (PSA 5-7)
  const rawNetAvg=gradeMap['Raw']?.netAvg||avgNetOf(listings);
  const rawGrossAvg=gradeMap['Raw']?.grossAvg||avgGrossOf(listings);

  const realisticNetPrices=REALISTIC_GRADES.map(g=>gradeMap[g]?.netAvg).filter(Boolean);
  const realisticNetAvg=realisticNetPrices.length?realisticNetPrices.reduce((a,b)=>a+b,0)/realisticNetPrices.length:null;
  const realisticLabel=realisticNetPrices.length===1
    ?REALISTIC_GRADES.find(g=>gradeMap[g]?.netAvg)
    :`PSA ${realisticNetPrices.length===2?'5–6':'5–7'} avg`;

  const psa8net=gradeMap['PSA 8']?.netAvg;
  const psa9net=gradeMap['PSA 9']?.netAvg;
  const psa10net=gradeMap['PSA 10']?.netAvg;
  const upsideNet=psa8net||psa9net;

  if(realisticNetAvg!=null&&rawNetAvg!=null){
    const netGain=realisticNetAvg-rawNetAvg-GRADING_COST;
    const roi=(netGain/rawNetAvg)*100;
    const upsideLine=upsideNet?` If it grades PSA 8+, net upside is ${fmtG(upsideNet)}.`:'';

    if(netGain>rawNetAvg*0.25&&netGain>15){
      return{
        decision:'grade',
        reason:`Realistic outcome (${realisticLabel}) nets ${fmtG(realisticNetAvg)} vs. selling raw at ${fmtG(rawNetAvg)}. Net gain after $${GRADING_COST} grading: ~${fmtG(netGain)} (+${roi.toFixed(0)}% ROI).${upsideLine}`,
        math:{rawGrossAvg,rawNetAvg,realisticNetAvg,realisticLabel,netGain,roi,psa10net,isRaw:true}
      };
    }
    if(netGain>0){
      return{
        decision:'sell',
        reason:`PSA 5–7 only adds ~${fmtG(netGain)} net after $${GRADING_COST} cost — thin margin. Sell raw at ${fmtG(rawNetAvg)} net.`,
        math:{rawGrossAvg,rawNetAvg,realisticNetAvg,realisticLabel,netGain,roi,isRaw:true}
      };
    }
    return{
      decision:'sell',
      reason:`PSA 5–7 net (${fmtG(realisticNetAvg)}) doesn't clear raw net (${fmtG(rawNetAvg)}) + $${GRADING_COST} grading cost. Sell raw.`,
      math:{rawGrossAvg,rawNetAvg,realisticNetAvg,realisticLabel,netGain,roi,isRaw:true}
    };
  }

  if(rawNetAvg>=120)return{decision:'keep',reason:`Raw net avg ${fmtG(rawNetAvg)} — meaningful value. Gather more graded comps before deciding.`};
  if(rawNetAvg>=25)return{decision:'sell',reason:`Raw net avg ${fmtG(rawNetAvg)}. Not enough graded comps to calculate ROI — sell raw.`};
  if(rawNetAvg)return{decision:'sell',reason:`Low net value (${fmtG(rawNetAvg)}). Not worth grading cost.`};
  return{decision:'keep',reason:`Insufficient comp data. Check eBay manually below.`};
}

function saveCollection(){localStorage.setItem('card_collection_v4',JSON.stringify(collection));}

function addToCollection(ci,listings,decision){
  const gradeMap=buildGradeMap(listings);
  const isGraded=!!(ci.gradingInfo);
  // For graded cards use the graded comp avg; for raw use raw comps
  let displayGross, displayNet;
  if(isGraded){
    const gradeKey=Object.keys(gradeMap).find(k=>k.toUpperCase()===(ci.gradingInfo||'').toUpperCase())||ci.gradingInfo;
    displayGross=gradeMap[gradeKey]?.grossAvg||avgGrossOf(listings);
  } else {
    displayGross=gradeMap['Raw']?.grossAvg||avgGrossOf(listings);
  }
  displayNet=netOf(displayGross);
  const entry={
    id:Date.now(),
    player:ci.player||'Unknown',year:ci.year||'',brand:ci.brand||'',
    set:ci.set||'',cardNumber:ci.cardNumber||'',
    variation:ci.variation||'',gradingInfo:ci.gradingInfo||'',sport:ci.sport||'',
    displayGross, displayNet,
    decision:decision.decision, reason:decision.reason,
    scannedAt:new Date().toLocaleDateString('en-US')
  };
  collection.unshift(entry);saveCollection();
  updateCollBadge();
}

function deleteCard(id){
  if(!confirm('Remove this card?'))return;
  collection=collection.filter(c=>c.id!==id);
  saveCollection();renderCollection();updateCollBadge();
}

function updateCollBadge(){
  const b=document.getElementById('coll-badge');
  b.textContent=collection.length?` (${collection.length})`:'';
}
updateCollBadge();

function renderCollection(){
  const search=(document.getElementById('coll-search')?.value||'').toLowerCase();
  const sortVal=document.getElementById('coll-sort')?.value||'date';
  let cards=[...collection];

  // Filter
  if(search)cards=cards.filter(c=>[c.player,c.year,c.brand,c.set,c.variation,c.gradingInfo].join(' ').toLowerCase().includes(search));

  // Sort
  cards.sort((a,b)=>{
    if(sortVal==='date')return b.id-a.id;
    if(sortVal==='value-desc')return(b.displayGross||b.rawGross||0)-(a.displayGross||a.rawGross||0);
    if(sortVal==='value-asc')return(a.displayGross||a.rawGross||0)-(b.displayGross||b.rawGross||0);
    if(sortVal==='player')return(a.player||'').localeCompare(b.player||'');
    if(sortVal==='decision')return(a.decision||'').localeCompare(b.decision||'');
    return 0;
  });

  // Summary stats
  const totalNet=collection.reduce((s,c)=>s+(c.displayNet||c.rawNet||0),0);
  const sells=collection.filter(c=>c.decision==='sell').length;
  const keeps=collection.filter(c=>c.decision==='keep').length;
  const grades=collection.filter(c=>c.decision==='grade').length;
  document.getElementById('coll-summary').innerHTML=`
    <div class="sum-box"><div class="sum-label">Cards</div><div class="sum-val">${collection.length}</div></div>
    <div class="sum-box"><div class="sum-label">Est. net value</div><div class="sum-val">${fmtG(totalNet||null)}</div></div>
    <div class="sum-box"><div class="sum-label">Sell / Keep / Grade</div><div class="sum-val">${sells} / ${keeps} / ${grades}</div></div>
  `;

  const list=document.getElementById('coll-list');
  if(!cards.length){
    list.innerHTML='<div class="coll-empty">'+(collection.length?'No cards match your search.':'Scan cards to build your collection.')+'</div>';
    return;
  }
  const icons={sell:'🔴 Sell',keep:'🟢 Keep',grade:'🔵 Grade'};
  list.innerHTML=cards.map(c=>{
    const meta=[c.year,c.brand,c.set,c.cardNumber,c.variation,c.gradingInfo||'Raw'].filter(Boolean).join(' · ');
    return`<div class="coll-card">
      <div class="coll-card-top">
        <div class="coll-card-left">
          <div class="coll-card-player">${c.player}</div>
          <div class="coll-card-meta">${meta}</div>
        </div>
        <div class="coll-card-right">
          <div class="coll-card-gross">${fmtG(c.displayGross||c.rawGross)}</div>
          <div class="coll-card-net">Net ${fmtG(c.displayNet||c.rawNet)}</div>
        </div>
      </div>
      <div class="coll-card-bottom">
        <div class="coll-card-reason">${c.reason} <span style="color:var(--text3)">· ${c.scannedAt}</span></div>
        <span class="badge ${c.decision}">${icons[c.decision]||c.decision}</span>
        <button class="del-btn" onclick="deleteCard(${c.id})" title="Delete">×</button>
      </div>
    </div>`;
  }).join('');
}
renderCollection();

// ════════════════════════════════════════════════════════
// CSV Export
// ════════════════════════════════════════════════════════
function exportCSV(){
  const headers=['Player','Year','Brand','Set','Card #','Variation','Grade/Condition','Sport','Gross Avg','Net Avg (after 13%)','Decision','Reason','Scanned'];
  const rows=collection.map(c=>[
    c.player,c.year,c.brand,c.set,c.cardNumber,c.variation,c.gradingInfo||'Raw',c.sport,
    (c.displayGross||c.rawGross)?(c.displayGross||c.rawGross).toFixed(2):'', (c.displayNet||c.rawNet)?(c.displayNet||c.rawNet).toFixed(2):'',
    c.decision,`"${(c.reason||'').replace(/"/g,"'")}"`,c.scannedAt
  ].join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`card-collection-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ════════════════════════════════════════════════════════
// Scan card back — confirm/correct identification
// ════════════════════════════════════════════════════════
let frontBase64 = null; // stored after front scan for combined ID

async function handleBackScan(e){
  const file=e.target.files[0];if(!file)return;
  e.target.value='';
  const reader=new FileReader();
  reader.onload=async ev=>{
    const backBase64=ev.target.result.split(',')[1];
    if(!frontBase64||!cardInfo)return;

    // Show scanning status
    const btn=document.getElementById('scan-back-btn');
    if(btn)btn.textContent='🔄 Confirming ID...';
    setStatus('Confirming card ID from back scan…',true);

    try{
      const data=await claudeCall([{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:frontBase64}},
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:backBase64}},
        {type:'text',text:`You are a sports card expert. I am showing you BOTH the front and back of the same card.
The back of the card will have the definitive year, set name, card number, and player stats printed on it.
Use BOTH images together to give the most accurate identification possible.

Current identification (may be wrong):
Player: ${cardInfo.player}
Year: ${cardInfo.year}
Brand: ${cardInfo.brand}
Set: ${cardInfo.set}
Card #: ${cardInfo.cardNumber}

Correct any errors using the card back as the authoritative source.

Return ONLY a JSON object:
- player: full name
- year: year or range e.g. "1986-87"
- brand: manufacturer
- set: set name
- cardNumber: with # prefix or null
- sport: Basketball/Baseball/Football/Golf/Hockey
- variation: RC/Rookie Card/Refractor/Prizm/etc or null
- gradingInfo: grading info if slabbed, else null
- ebayQuery: 4-7 word eBay search string
- corrected: true if you changed anything from the current ID, false if confirmed as-is

Raw JSON only, no markdown.`}
      ]}]);

      if(!data)return;
      const txt=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      const newInfo=JSON.parse(txt.replace(/```json|```/g,'').trim());

      if(newInfo.error){setStatus('',false);showError(newInfo.error);return;}

      const wasCorreected=newInfo.corrected;
      cardInfo={...newInfo};

      // Re-fetch comps with corrected info if ID changed
      if(wasCorreected){
        setStatus('ID updated — fetching new comps…',true);
        const query=cardInfo.ebayQuery||[cardInfo.year,cardInfo.brand,cardInfo.player,cardInfo.cardNumber].filter(Boolean).join(' ');
        allListings=await fetchSoldComps(query);
        if(allListings.length<6){
          setStatus('Supplementing with estimates…',true);
          try{
            const est=await claudeCall([{role:'user',content:`You are a sports card market expert. Provide realistic recent eBay SOLD price estimates for: ${[cardInfo.year,cardInfo.brand,cardInfo.set,cardInfo.player,cardInfo.cardNumber,cardInfo.variation].filter(Boolean).join(' ')}. Return ONLY a JSON array: [{"title":"...","price":"$XX.XX","dateSold":"Est. 2025","condition":"Raw|PSA 5|PSA 6|PSA 7|PSA 8|PSA 9|PSA 10","url":null}]. Raw JSON only.`}]);
            if(est){
              const etxt=est.content.filter(b=>b.type==='text').map(b=>b.text).join('');
              const eparsed=JSON.parse(etxt.replace(/```json|```/g,'').trim());
              if(Array.isArray(eparsed))allListings=[...allListings,...eparsed];
            }
          }catch(e){}
        }
      }

      setStatus('',false);
      const gradeMap=buildGradeMap(allListings);
      const decision=makeDecision(cardInfo,allListings,gradeMap);

      // Update collection entry
      collection=collection.filter(c=>c.id!==collection[0]?.id);
      addToCollection(cardInfo,allListings,decision);
      buildResult(wasCorreected?'✓ ID corrected from card back':'✓ ID confirmed from card back');

    }catch(e){
      setStatus('',false);
      showError('Back scan failed: '+e.message);
      if(btn)btn.textContent='🔄 Scan card back to confirm ID';
    }
  };
  reader.readAsDataURL(file);
}

// ════════════════════════════════════════════════════════
// Main scan flow
// ════════════════════════════════════════════════════════
async function run(base64){
  document.getElementById('result').style.display='none';
  clearError();allListings=[];cardInfo=null;activeFilter='All';

  frontBase64=base64; // store for optional back scan
  setStatus('Identifying card…',true);
  try{
    const data=await claudeCall([{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
      {type:'text',text:`You are a sports card expert. Identify this card precisely.
Return ONLY a JSON object:
- player: full name
- year: year or range e.g. "1986-87"
- brand: Topps/Fleer/Panini/Upper Deck/etc
- set: set name
- cardNumber: with # prefix or null
- sport: Basketball/Baseball/Football/Golf/Hockey
- variation: RC/Rookie Card/Refractor/Prizm/Holo/Gold/etc — null if base
- gradingInfo: "PSA 9" / "BGS 8.5" if in a graded slab, else null
- ebayQuery: 4-7 word eBay search — player, year, brand/set, card# if known. No grade/condition words.

If not a sports card: {"error":"Not a sports card"}
Raw JSON only, no markdown.`}
    ]}]);
    if(!data)return;
    const txt=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    cardInfo=JSON.parse(txt.replace(/```json|```/g,'').trim());
  }catch(e){setStatus('',false);showError(`Identification failed: ${e.message}`);return;}
  if(cardInfo.error){setStatus('',false);showError(cardInfo.error);return;}

  setStatus('Fetching eBay sold comps…',true);
  const query=cardInfo.ebayQuery||[cardInfo.year,cardInfo.brand,cardInfo.player,cardInfo.cardNumber].filter(Boolean).join(' ');
  allListings=await fetchSoldComps(query);

  if(allListings.length<6){
    setStatus('eBay API returned limited results — supplementing with estimates…',true);
    try{
      const est=await claudeCall([{role:'user',content:`You are a sports card market expert with deep knowledge of recent eBay sold prices.

Card: ${[cardInfo.year,cardInfo.brand,cardInfo.set,cardInfo.player,cardInfo.cardNumber,cardInfo.variation].filter(Boolean).join(' ')}

Provide realistic recent eBay SOLD price estimates for this card across these conditions: Raw, PSA 5, PSA 6, PSA 7, PSA 8, PSA 9, PSA 10. Only include grades where there is a plausible market. Use conservative, realistic prices — not best-case. PSA 5-7 should be modest. PSA 10 significantly higher.

Return ONLY a JSON array:
[{"title":"[card description] [grade]","price":"$XX.XX","dateSold":"Est. 2025","condition":"Raw|PSA 5|PSA 6|PSA 7|PSA 8|PSA 9|PSA 10","url":null}]

Raw JSON array only, no markdown.`}]);
      if(est){
        const txt=est.content.filter(b=>b.type==='text').map(b=>b.text).join('');
        const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
        if(Array.isArray(parsed))allListings=[...allListings,...parsed];
      }
    }catch(e){}
  }

  setStatus('',false);
  const gradeMap=buildGradeMap(allListings);
  const decision=makeDecision(cardInfo,allListings,gradeMap);
  addToCollection(cardInfo,allListings,decision);
  buildResult();
}
</script>
